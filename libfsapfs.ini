[project]
description: "libfsapfs is a library to access the Apple File System (APFS)."
name: "libfsapfs"
status: "experimental"
year_of_creation: "2018"
documentation_url: "https://github.com/libyal/libfsapfs/tree/main/documentation"
features: ["debug_output", "ossfuzz", "python_bindings", "tools"]

[library]
build_dependencies: ["crypto", "zlib"]
description: "Library to access the Apple File System (APFS) format"
features: ["pthread", "wide_character_type"]
public_types: ["container", "extended_attribute", "file_entry", "snapshot", "volume"]
tests: ["bit_stream", "btree_entry", "btree_footer", "btree_node", "btree_node_header", "buffer_data_handle", "checkpoint_map", "checkpoint_map_entry", "checksum", "chunk_information_block", "container_data_handle", "container_key_bag", "container_reaper", "container_superblock", "compressed_data_handle", "compression", "data_block", "data_block_data_handle", "data_stream", "deflate", "directory_record", "encryption_context", "error", "extended_attribute", "extent_reference_tree", "file_extent", "file_system", "file_system_btree", "file_system_data_handle", "fusion_middle_tree", "huffman_tree", "inode", "io_handle", "key_bag_entry", "key_bag_header", "key_encrypted_key", "name", "name_hash", "notify", "object", "object_map", "object_map_btree", "object_map_descriptor", "profiler", "snapshot", "snapshot_metadata", "snapshot_metadata_tree", "space_manager", "volume", "volume_key_bag"]
tests_with_input: ["container", "support"]

[python_module]
tests: ["support"]
tests_with_input: ["container", "volume"]

[tools]
build_dependencies: ["crypto", "fuse"]
description: "Several tools for reading Apple File System (APFS) volumes"
names: ["fsapfsinfo", "fsapfsmount"]
tests: ["bodyfile", "digest_hash", "info_handle", "mount_path_string", "output", "path_string", "signal"]

[info_tool]
source_description: "an Apple File System (APFS) container"
source_type: "container"

[mount_tool]
features: ["offset", "password", "recovery_password"]
base_type: "container"
file_entry_access_time_type: "nano_posix_time"
file_entry_creation_time_type: "nano_posix_time"
file_entry_example: ".Spotlight-V100/Store-V1/VolumeConfig.plist"
file_entry_inode_change_time_type: "nano_posix_time"
file_entry_modification_time_type: "nano_posix_time"
file_entry_type: "file_entry"
file_system_type: "volume"
mounted_description: "a file system contained in the APFS container"
source: "image.dmg"
source_description: "an APFS container"
source_description_long: "an Apple File System (APFS) container"
source_type: "container"

[test_data]
repository: "log2timeline/dfvfs"
files: ["apfs.raw"]

[tests]
profiles: ["libfsapfs", "pyfsapfs", "fsapfsinfo", "fsapfsinfo_bodyfile_fs", "fsapfsinfo_fs"]
option_sets: ["offset", "password"]
options_per_profile: ["", "", "", "-Bbodyfile -H", "-H"]
info_tool_profiles: ["fsapfsinfo", "fsapfsinfo_fs", "fsapfsinfo_bodyfile_fs"]
example_filename1: "image1.dmg"
example_filename2: "image2.dmg"

